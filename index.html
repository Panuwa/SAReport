<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dek71 Tracker">
    <title>Dek71 Mission Control: Secured</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { 
            font-family: 'Noto Sans Thai', sans-serif; 
            background-color: #f1f5f9; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        input[type="checkbox"] { accent-color: #4f46e5; transform: scale(1.1); cursor: pointer; }
        input:disabled { opacity: 0.5; cursor: not-allowed; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // --- 1. FIREBASE CONFIGURATION ---
        // ==========================================
        const firebaseConfig = {
          apiKey: "AIzaSyDXQ9TIM1NbyR-PJNbVO74Cf_1w3hDWuGM",
          authDomain: "dek71-8af86.firebaseapp.com",
          projectId: "dek71-8af86",
          storageBucket: "dek71-8af86.firebasestorage.app",
          messagingSenderId: "885325722595",
          appId: "1:885325722595:web:f79d36e1b78651217ea6d6",
          measurementId: "G-YDCNM0C1FR"
        };

        let db;
        try {
            if (typeof firebase !== 'undefined' && !firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            if (typeof firebase !== 'undefined') {
                db = firebase.firestore();
            }
        } catch (e) {
            console.error("Firebase Init Error:", e);
        }

        // ==========================================
        // --- 2. DATA & ASSETS ---
        // ==========================================
        
        const MASTER_CURRICULUM = {
            tpat1: ["เชาวน์ปัญญา", "จริยธรรมแพทย์", "ความเชื่อมโยง"],
            math1: ["เซต/ตรรกศาสตร์", "จำนวนจริง", "ฟังก์ชัน", "เรขาคณิต", "Expo/Log", "ตรีโกณ", "เมทริกซ์", "เวกเตอร์", "เชิงซ้อน", "ความน่าจะเป็น", "ลำดับอนุกรม", "แคลคูลัส", "สถิติ"],
            phy: ["กลศาสตร์ 1", "กลศาสตร์ 2", "คลื่น/แสง/เสียง", "ไฟฟ้า", "สสาร/ความร้อน", "ฟิสิกส์อะตอม"],
            chem: ["อะตอม/ตารางธาตุ", "พันธะเคมี", "ปริมาณสาร", "ของแข็ง/เหลว/แก๊ส", "อัตรา/สมดุล", "กรด-เบส", "ไฟฟ้าเคมี", "อินทรีย์", "พอลิเมอร์"],
            bio: ["พื้นฐานชีวะ/เซลล์", "ระบบร่างกายสัตว์", "พืช", "พันธุศาสตร์", "ระบบนิเวศ"],
            eng: ["Vocabulary 3000", "Reading", "Conversation", "Grammar", "Writing"],
            thai: ["หลักภาษา", "การอ่าน/เขียน", "วรรณคดี"],
            soc: ["ศาสนา", "หน้าที่พลเมือง", "เศรษฐศาสตร์", "ประวัติศาสตร์", "ภูมิศาสตร์"]
        };

        const Icons = {
            Target: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
            Book: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>,
            Brain: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
            Close: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Cloud: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19c0-3.037-2.463-5.5-5.5-5.5S6.5 15.963 6.5 19"/><path d="M12 13.5v-8"/><path d="m15 8.5-3-3-3 3"/><path d="M12 2a8 8 0 0 1 8 8c0 3.86-2.5 7.144-6 8"/></svg>,
            Flag: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>,
            Trophy: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 21h8"/><path d="M12 17v4"/><path d="M7 4h10"/><path d="M17 4v6a5 5 0 1 1-10 0V4"/><line x1="7" y1="9" x2="17" y2="9"/></svg>,
            Edit: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
            Lock: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>,
            Unlock: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>
        };

        // --- 3. COMPONENTS ---

        const ScoreChart = ({ history, targetScore }) => {
            if (!history || history.length < 2) return <div className="h-32 flex items-center justify-center text-gray-400 text-xs border border-dashed rounded-lg">บันทึก 2 ครั้งเพื่อดูกราฟ</div>;
            
            const height = 100, width = 400, padding = 10;
            const points = history.map((entry, index) => {
                const xStep = (width - padding * 2) / (history.length - 1);
                const x = padding + index * xStep;
                const y = height - padding - (entry.score / 100) * (height - padding * 2);
                return `${x},${y}`;
            }).join(' ');
            
            return (
                <div className="w-full overflow-hidden mb-4">
                    <svg viewBox={`0 0 ${width} ${height}`} className="w-full bg-white rounded-lg border border-gray-100">
                        <polyline points={points} fill="none" stroke="#4f46e5" strokeWidth="2" />
                        {history.map((entry, i) => {
                            const x = padding + i * ((width - padding * 2) / (history.length - 1));
                            const y = height - padding - (entry.score / 100) * (height - padding * 2);
                            return <circle key={i} cx={x} cy={y} r="3" fill="#fff" stroke="#4f46e5" strokeWidth="2" />;
                        })}
                    </svg>
                </div>
            );
        };

        const SubjectModal = ({ subject, isAdmin, onClose, onUpdateTopic, onToggleReview, onAddScore, onDeleteScore, onUpdateTarget }) => {
            if (!subject) return null;
            const [newScore, setNewScore] = React.useState('');
            const [newDate, setNewDate] = React.useState(new Date().toISOString().split('T')[0]);

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="bg-white rounded-2xl w-full max-w-2xl max-h-[90vh] shadow-2xl z-10 flex flex-col slide-up overflow-hidden">
                        <div className={`p-4 ${subject.color} bg-opacity-10 border-b border-gray-100 flex justify-between items-center`}>
                            <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                                <span className={`p-2 rounded-lg ${subject.color} text-white`}>{subject.icon === 'Target' ? <Icons.Target /> : <Icons.Book />}</span>
                                {subject.name}
                            </h2>
                            <button onClick={onClose}><Icons.Close /></button>
                        </div>

                        <div className="flex-1 overflow-y-auto p-4 md:p-6 scrollbar-hide">
                            {!isAdmin && <div className="mb-4 bg-orange-50 border border-orange-200 text-orange-700 p-2 text-xs rounded text-center">🔒 View Only Mode (Login to Edit)</div>}
                            
                            <div className="mb-6 bg-gray-50 rounded-xl p-4 border border-gray-100">
                                <h3 className="text-xs font-bold text-gray-400 uppercase mb-4">Analytics</h3>
                                <ScoreChart history={subject.scoreHistory} targetScore={subject.targetScore} />
                                <div className="grid grid-cols-2 gap-2 mb-4">
                                    <div>
                                        <label className="text-[10px] text-gray-400 font-bold">TARGET</label>
                                        <input disabled={!isAdmin} type="number" value={subject.targetScore || ''} onChange={(e) => onUpdateTarget(subject.id, e.target.value)} className="w-full text-sm border rounded p-2" placeholder="0" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] text-gray-400 font-bold">ADD SCORE</label>
                                        <div className="flex gap-1">
                                            <input disabled={!isAdmin} type="number" value={newScore} onChange={(e) => setNewScore(e.target.value)} className="w-full text-sm border rounded p-2" placeholder="0" />
                                            <button disabled={!isAdmin} onClick={() => { if(newScore !== '') { onAddScore(subject.id, parseInt(newScore), newDate); setNewScore(''); }}} className="bg-gray-800 text-white rounded px-2 disabled:bg-gray-400"><Icons.Plus /></button>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="max-h-40 overflow-y-auto border-t border-gray-100 pt-2">
                                    <table className="w-full text-xs">
                                        <tbody>
                                            {[...(subject.scoreHistory || [])].reverse().map((h, i) => (
                                                <tr key={i} className="border-b border-gray-50">
                                                    <td className="py-1 text-gray-500">{new Date(h.date).toLocaleDateString('th-TH')}</td>
                                                    <td className="py-1 font-bold">{h.score}</td>
                                                    <td className="py-1 text-right"><button disabled={!isAdmin} onClick={() => onDeleteScore(subject.id, (subject.scoreHistory.length - 1) - i)} className="text-red-300 hover:text-red-500 disabled:opacity-50"><Icons.Trash /></button></td>
                                                </tr>
                                            ))}
                                            {(!subject.scoreHistory || subject.scoreHistory.length === 0) && (
                                                <tr><td colSpan="3" className="text-center text-gray-400 py-4">No scores yet</td></tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            
                            <div className="space-y-2">
                                {subject.topics.map((topic, index) => (
                                    <div key={index} className="flex items-center justify-between p-3 rounded-lg border bg-white border-gray-100">
                                        <label className="flex items-center flex-1 cursor-pointer">
                                            <input disabled={!isAdmin} type="checkbox" checked={topic.completed} onChange={() => onUpdateTopic(subject.id, index)} className="w-5 h-5 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500 disabled:cursor-not-allowed" />
                                            <span className={`ml-3 text-sm ${topic.completed ? 'text-gray-400 line-through' : ''}`}>{topic.name}</span>
                                        </label>
                                        <button disabled={!isAdmin} onClick={() => onToggleReview(subject.id, index)} className={`p-2 rounded-full ${topic.review ? 'text-yellow-500 bg-yellow-50' : 'text-gray-300'}`}><Icons.Flag /></button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const PinModal = ({ onSubmit, onClose, mode = 'login' }) => {
            const [pin, setPin] = React.useState('');
            return (
                <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                    <div className="bg-white p-6 rounded-2xl w-full max-w-xs text-center slide-up">
                        <div className="mb-4 text-indigo-600 flex justify-center"><Icons.Lock /></div>
                        <h3 className="text-lg font-bold mb-2">{mode === 'create' ? 'ตั้งรหัส PIN ใหม่' : 'ใส่รหัส PIN เพื่อแก้ไข'}</h3>
                        <p className="text-xs text-gray-400 mb-4">{mode === 'create' ? 'กรุณาจำรหัสนี้ให้ดี เพื่อใช้แก้ไขข้อมูล' : 'กรอกรหัส 4 หลักเพื่อปลดล็อค'}</p>
                        <input type="tel" maxLength="4" value={pin} onChange={(e) => setPin(e.target.value)} className="w-full text-center text-2xl tracking-[1em] font-bold p-3 border rounded-xl mb-4 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="••••" />
                        <div className="flex gap-2">
                            {mode === 'login' && <button onClick={onClose} className="flex-1 py-2 text-gray-500 bg-gray-100 rounded-lg">ยกเลิก</button>}
                            <button onClick={() => onSubmit(pin)} className="flex-1 py-2 text-white bg-indigo-600 rounded-lg font-bold shadow-lg hover:bg-indigo-700">ยืนยัน</button>
                        </div>
                    </div>
                </div>
            );
        };

        const Dek71App = () => {
            const [subjects, setSubjects] = React.useState([]);
            const [adminPin, setAdminPin] = React.useState(null); // Null = not set yet
            const [isAdmin, setIsAdmin] = React.useState(false); // False = View Only
            const [showPinModal, setShowPinModal] = React.useState(false); // 'login' or 'create' or false
            
            const [selectedSubject, setSelectedSubject] = React.useState(null);
            const [status, setStatus] = React.useState('connecting'); 
            const [errorMsg, setErrorMsg] = React.useState('');
            const [examDateStr, setExamDateStr] = React.useState('2028-03-15');
            const [timeLeft, setTimeLeft] = React.useState({ days: 0, hours: 0 });
            const [isEditingDate, setIsEditingDate] = React.useState(false);

            const createInitialData = () => [
                { id: 'tpat1', name: 'TPAT1', weight: 30, color: 'bg-orange-500', icon: 'Brain', targetScore: 200 },
                { id: 'math1', name: 'คณิต 1', weight: 14, color: 'bg-blue-600', icon: 'Target', targetScore: 50 },
                { id: 'phy', name: 'ฟิสิกส์', weight: 9.33, color: 'bg-indigo-500', icon: 'Book', targetScore: 45 },
                { id: 'chem', name: 'เคมี', weight: 9.33, color: 'bg-teal-500', icon: 'Book', targetScore: 50 },
                { id: 'bio', name: 'ชีววิทยา', weight: 9.33, color: 'bg-green-500', icon: 'Book', targetScore: 60 },
                { id: 'eng', name: 'อังกฤษ', weight: 14, color: 'bg-purple-600', icon: 'Book', targetScore: 70 },
                { id: 'thai', name: 'ภาษาไทย', weight: 7, color: 'bg-pink-500', icon: 'Book', targetScore: 70 },
                { id: 'soc', name: 'สังคม', weight: 7, color: 'bg-yellow-500', icon: 'Book', targetScore: 60 },
            ].map(sub => ({ 
                ...sub, 
                progress: 0, 
                scoreHistory: [],
                topics: MASTER_CURRICULUM[sub.id] ? MASTER_CURRICULUM[sub.id].map(t => ({ name: t, completed: false, review: false })) : [] 
            }));

            React.useEffect(() => {
                if (!db) return setStatus('error');
                const docRef = db.collection('dek71_data').doc('user_data');

                const unsubscribe = docRef.onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        // Migration Check: Ensure scoreHistory exists
                        const migratedData = (data.subjects || []).map(s => ({
                            ...s,
                            scoreHistory: Array.isArray(s.scoreHistory) ? s.scoreHistory : (s.score ? [{date: new Date().toISOString(), score: s.score}] : [])
                        }));
                        setSubjects(migratedData);
                        
                        if (data.settings && data.settings.pin) {
                            setAdminPin(data.settings.pin);
                        } else {
                            setAdminPin(null); // Prompt to create
                            setShowPinModal('create');
                        }

                        if (data.examDate) {
                            setExamDateStr(data.examDate);
                        }
                    } else {
                        const initialData = createInitialData();
                        docRef.set({ subjects: initialData, settings: { pin: null }, examDate: '2028-03-15' });
                        setSubjects(initialData);
                        setShowPinModal('create');
                    }
                    setStatus('online');
                }, (err) => {
                    console.error(err);
                    setStatus('error');
                    if (err.code === 'permission-denied') setErrorMsg('สิทธิ์ไม่ผ่าน (ปรับ Rules เป็น True)');
                    else setErrorMsg(err.message);
                });
                return () => unsubscribe();
            }, []);

            // Timer Logic
            React.useEffect(() => {
                const timer = setInterval(() => {
                    const diff = new Date(examDateStr + 'T00:00:00') - new Date();
                    setTimeLeft({ days: Math.floor(diff / (86400000)), hours: Math.floor((diff / 3600000) % 24) });
                }, 1000);
                return () => clearInterval(timer);
            }, [examDateStr]);

            const handlePinSubmit = (inputPin) => {
                if (showPinModal === 'create') {
                    if (inputPin.length < 4) return alert("PIN ต้องมี 4 หลัก");
                    db.collection('dek71_data').doc('user_data').set({ settings: { pin: inputPin } }, { merge: true });
                    setAdminPin(inputPin);
                    setIsAdmin(true);
                    setShowPinModal(false);
                } else if (showPinModal === 'login') {
                    if (inputPin === adminPin) {
                        setIsAdmin(true);
                        setShowPinModal(false);
                    } else {
                        alert("รหัสผิด (Wrong PIN)");
                    }
                }
            };

            const saveData = (newSubjects) => {
                setSubjects(newSubjects);
                setStatus('syncing');
                if (!db) return;
                db.collection('dek71_data').doc('user_data').update({ subjects: newSubjects })
                    .then(() => setStatus('online'))
                    .catch((err) => setStatus('error'));
            };

            const updateSubject = (id, fn) => {
                if (!isAdmin) return; // Guard
                const newSubjects = subjects.map(s => s.id === id ? fn(s) : s);
                saveData(newSubjects);
                if(selectedSubject?.id === id) setSelectedSubject(newSubjects.find(s => s.id === id));
            };

            const getTotalReadiness = () => subjects.length ? subjects.reduce((acc, sub) => acc + (sub.progress * sub.weight / 100), 0) : 0;
            const reviewQueue = subjects.flatMap(s => s.topics.filter(t => t.review).map(t => ({...t, subject: s.name, color: s.color})));

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-6 min-h-screen pb-20">
                    <header className="mb-6">
                        <div className="flex justify-between items-center mb-4">
                            <h1 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                                <span className="bg-indigo-600 text-white p-1.5 rounded-lg"><Icons.Target /></span> Dek71
                            </h1>
                            <div className="flex items-center gap-3">
                                {/* LOCK TOGGLE */}
                                <button 
                                    onClick={() => isAdmin ? setIsAdmin(false) : setShowPinModal('login')} 
                                    className={`flex items-center gap-1 px-3 py-1 rounded-full text-xs font-bold transition-all ${isAdmin ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-gray-100 text-gray-500 border border-gray-200'}`}
                                >
                                    {isAdmin ? <><Icons.Unlock /> Admin Mode</> : <><Icons.Lock /> View Only</>}
                                </button>
                                
                                <div className="flex items-center gap-2">
                                    <div className={`w-2 h-2 rounded-full ${status === 'online' ? 'bg-green-500' : (status === 'syncing' ? 'bg-yellow-500 animate-pulse' : 'bg-red-500')}`}></div>
                                </div>
                            </div>
                        </div>

                        {errorMsg && <div className="bg-red-50 text-red-600 p-2 text-xs rounded mb-4 border border-red-200">{errorMsg}</div>}

                        <div className="grid grid-cols-2 gap-3 mb-4">
                            <div className="bg-white p-3 rounded-xl border border-gray-100 shadow-sm relative group">
                                <div className="text-xs text-gray-400 font-bold uppercase">Countdown</div>
                                <div className="text-lg font-bold text-indigo-600">{timeLeft.days} วัน</div>
                                {isEditingDate && isAdmin ? (
                                    <input 
                                        type="date" 
                                        value={examDateStr} 
                                        onChange={(e) => { 
                                            const newDate = e.target.value;
                                            setExamDateStr(newDate); 
                                            if(db) db.collection('dek71_data').doc('user_data').update({ examDate: newDate });
                                            setIsEditingDate(false);
                                        }} 
                                        className="text-xs w-full mt-1 border rounded p-1" 
                                        autoFocus
                                        onBlur={() => setIsEditingDate(false)}
                                    />
                                ) : (
                                    <div 
                                        onClick={() => isAdmin && setIsEditingDate(true)} 
                                        className={`text-[10px] text-gray-400 mt-1 flex items-center gap-1 ${isAdmin ? 'cursor-pointer hover:text-indigo-500' : 'cursor-default'}`}
                                    >
                                        Target: {new Date(examDateStr).toLocaleDateString('th-TH')} 
                                        {isAdmin && <Icons.Edit />}
                                    </div>
                                )}
                            </div>
                            <div className="bg-gradient-to-br from-indigo-500 to-purple-600 p-3 rounded-xl text-white shadow-lg relative overflow-hidden">
                                <div className="relative z-10">
                                    <div className="text-xs opacity-80">Readiness</div>
                                    <div className="text-2xl font-bold">{getTotalReadiness().toFixed(1)}%</div>
                                    <div className="w-full bg-white/20 h-1 mt-2 rounded-full"><div className="bg-white h-1 rounded-full" style={{width: `${getTotalReadiness()}%`}}></div></div>
                                </div>
                            </div>
                        </div>

                        {reviewQueue.length > 0 && (
                            <div className="bg-yellow-50 border border-yellow-100 rounded-xl p-4 mb-4">
                                <h3 className="text-sm font-bold text-yellow-800 flex items-center gap-2 mb-2">
                                    <Icons.Flag /> ต้องทบทวนด่วน ({reviewQueue.length})
                                </h3>
                                <div className="flex flex-wrap gap-2">
                                    {reviewQueue.slice(0, 3).map((item, i) => <span key={i} className="text-xs bg-white border border-yellow-200 text-yellow-700 px-2 py-1 rounded shadow-sm">{item.subject}: {item.name.substring(0, 15)}...</span>)}
                                </div>
                            </div>
                        )}
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                        {subjects.map(sub => {
                            const score = sub.scoreHistory && sub.scoreHistory.length > 0 ? sub.scoreHistory[sub.scoreHistory.length-1].score : 0;
                            const reviewCount = sub.topics.filter(t => t.review).length;
                            return (
                                <div key={sub.id} onClick={() => setSelectedSubject(sub)} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 active:scale-[0.98] transition-transform relative overflow-hidden">
                                    <div className={`absolute bottom-0 left-0 h-1 ${sub.color}`} style={{ width: `${sub.progress}%` }}></div>
                                    <div className="flex justify-between items-start">
                                        <div className="flex items-center gap-3">
                                            <div className={`p-2 rounded-lg ${sub.color} bg-opacity-10 text-gray-700 relative`}>
                                                {sub.icon === 'Target' ? <Icons.Target /> : <Icons.Book />}
                                                {reviewCount > 0 && <div className="absolute -top-1 -right-1 w-3 h-3 bg-yellow-500 rounded-full border-2 border-white"></div>}
                                            </div>
                                            <div>
                                                <h3 className="font-bold text-gray-800 flex items-center gap-2">
                                                    {sub.name}
                                                </h3>
                                                <div className="text-xs text-gray-400">Score: {score > 0 ? score : '-'} / {sub.targetScore}</div>
                                            </div>
                                        </div>
                                        <div className="text-xl font-bold text-gray-800">{sub.progress}%</div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {selectedSubject && (
                        <SubjectModal 
                            subject={selectedSubject} 
                            isAdmin={isAdmin}
                            onClose={() => setSelectedSubject(null)} 
                            onUpdateTopic={(id, i) => updateSubject(id, s => { 
                                const t = [...s.topics]; 
                                t[i].completed = !t[i].completed; 
                                return { ...s, topics: t, progress: Math.round((t.filter(x=>x.completed).length / t.length)*100) }; 
                            })}
                            onToggleReview={(id, i) => updateSubject(id, s => { const t = [...s.topics]; t[i].review = !t[i].review; return { ...s, topics: t }; })} 
                            onAddScore={(id, sc, d) => updateSubject(id, s => ({ ...s, scoreHistory: [...(s.scoreHistory || []), {score: sc, date: d}] }))} 
                            onDeleteScore={(id, i) => updateSubject(id, s => { const h = [...(s.scoreHistory || [])]; h.splice(i, 1); return { ...s, scoreHistory: h }; })}
                            onUpdateTarget={(id, v) => updateSubject(id, s => ({ ...s, targetScore: parseInt(v)||0 }))} 
                        />
                    )}

                    {showPinModal && <PinModal mode={showPinModal} onSubmit={handlePinSubmit} onClose={() => setShowPinModal(false)} />}
                    
                    <div className="text-center text-[10px] text-gray-300 mt-8">v3.2 Security Enabled</div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dek71App />);
    </script>
</body>
</html>
